{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Collection</title>
    <link rel="icon" type="image/png" href="{% static 'PSlogo.png' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            gap: 4rem;
        }

        h1 {
            color: #ffffff;
            font-size: 4rem;
            letter-spacing: 0.20rem;
        }

        .ps3-btn {
            background-color: #ffffff;
            border: 2px solid #003087;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 15px;
            width: 200px;
            height: 100px;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ps3-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .ps3-btn:hover {
            background-color: #003087;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 48, 135, 0.7);
        }
    </style>
</head>
<body>
    <h1>Physical Game Collection</h1>
    <button class="ps3-btn">
        <img src="{% static 'PS3logo.png' %}" alt="PS3">
    </button>
</body>
</html>
