{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS3 Collection</title>
    <link rel="icon" type="image/png" href="{% static 'PSlogo.png' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            gap: 4rem;
        }

        h1 {
            color: #ffffff;
            font-size: 4rem;
            letter-spacing: 0.20rem;
        }

        .btn-group {
            display: flex;
            gap: 2rem;
        }

        .collection-btn {
            background-color: #ffffff;
            border: 2px solid #003087;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 15px;
            width: 200px;
            height: 80px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #003087;
            letter-spacing: 0.05rem;
        }

        .collection-btn:hover {
            background-color: #003087;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 48, 135, 0.7);
        }
    </style>
</head>
<body>
    <h1>PS3 Collection</h1>
    <div class="btn-group">
        <a href="{% url 'standard_games' %}"><button class="collection-btn">Standard Games</button></a>
        <button class="collection-btn">Edition Games</button>
    </div>
</body>
</html>
